# Spring Application Properties
spring.application.name=auto-checker

# Server Configuration
server.port=8080

# SQLite DataSource Configuration
spring.datasource.url=jdbc:sqlite:C:/Users/suppo/Auto-Checker/scanner.db?journal_mode=WAL&busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Multipart File Upload Configurations
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Custom Scanner Config — ABSOLUTE path so dirs always created in the right place
app.projects-dir=C:/Users/suppo/Auto-Checker/Projects

# Async thread pool for background scans
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=10

# SSE timeout — keep connections alive for 30 minutes
spring.mvc.async.request-timeout=1800000

# Groq API Configurations
ai.provider=groq
groq.api.key=${GROQ_API_KEY}
groq.model=llama-3.3-70b-versatile
groq.batch.size=5

# Parallel Crawling Configurations
crawler.parallel.enabled=true
crawler.parallel.workers=50
